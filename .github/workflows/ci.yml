name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libzstd-dev liblzma-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install zstd xz

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install zstd:x64-windows liblzma:x64-windows

      - name: Configure
        run: cmake -B build -DCZIM_BUILD_TESTS=ON ${{ runner.os == 'Windows' && '-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake' || '' }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --verbose ${{ runner.os == 'Windows' && '-C Release' || '' }}
